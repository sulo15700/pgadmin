apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin-deployment
  labels:
    app: pgadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      app: pgadmin
    spec:
      containers:
        - name: pgadmin-cntr
          image: dpage/pgadmin4
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: emailuser@gmail.com
            - name: PGADMIN_DEFAULT_PASSWORD
              value: 123456
          volumeMounts:
            - mountPath: /var/lib/pgadmin
              name: pgadmin-storage
      volumes:
        - name: pgadmin-storage
          claimName: pgadmin-pv-claim


